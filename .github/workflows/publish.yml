name: Publish Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  ci-and-publish:
    name: CI & Dual Registry Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # Essencial para Segurança/NPM Provenance

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js (Ambiente de Build)
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Instalar Dependências
        run: npm ci

      - name: Code Quality (Linter)
        run: npm run lint

      - name: Garantia de Qualidade (Testes)
        run: npm test -- --run

      - name: Compilação (Build Artifacts)
        run: npm run build

      - name: Setup Auth para NPMJS
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"
          scope: "@raicampos"

      - name: Deploy para NPMJS (com Provenance)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Setup Auth para GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://npm.pkg.github.com"
          scope: "@raicampos"

      - name: Deploy para GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish --registry=https://npm.pkg.github.com
